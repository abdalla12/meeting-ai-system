apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: meeting-ai
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/meeting-ai/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_SPEECH_API
              value: "http://speech-service:8001"
            - name: NEXT_PUBLIC_DIARIZATION_API
              value: "http://diarization-service:8002"
            - name: NEXT_PUBLIC_TRANSLATION_API
              value: "http://translation-service:8003"
            - name: NEXT_PUBLIC_SUMMARIZATION_API
              value: "http://summarization-service:8004"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: meeting-ai
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meeting-ai-ingress
  namespace: meeting-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: meeting-ai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api/speech
            pathType: Prefix
            backend:
              service:
                name: speech-service
                port:
                  number: 8001
          - path: /api/diarization
            pathType: Prefix
            backend:
              service:
                name: diarization-service
                port:
                  number: 8002
          - path: /api/translation
            pathType: Prefix
            backend:
              service:
                name: translation-service
                port:
                  number: 8003
          - path: /api/summarization
            pathType: Prefix
            backend:
              service:
                name: summarization-service
                port:
                  number: 8004
---

apiVersion: v1
kind: Namespace
metadata:
  name: meeting-ai
