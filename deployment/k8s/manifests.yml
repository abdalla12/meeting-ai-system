

apiVersion: apps/v1
kind: Deployment
metadata:
  name: speech-service
  namespace: meeting-ai
  labels:
    app: speech-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speech-service
  template:
    metadata:
      labels:
        app: speech-service
    spec:
      containers:
        - name: speech-service
          image: ghcr.io/meeting-ai/speech-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: DEVICE
              value: "cpu"
            - name: WHISPER_MODEL_SIZE
              value: "base"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: speech-service
  namespace: meeting-ai
spec:
  selector:
    app: speech-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---

